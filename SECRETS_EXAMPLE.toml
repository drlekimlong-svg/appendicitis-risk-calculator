# =========================
# Streamlit secrets example
# =========================
# Đây là file MẪU. Không chứa secret thật.
# Khi chạy local: lưu thành .streamlit/secrets.toml
# Khi deploy Streamlit Community Cloud: copy nội dung cần dùng vào mục Edit Secrets.

# -------------------------
# 1) MEMBER LOGIN (OIDC)
# -------------------------
# Ví dụ dùng Google Auth Platform.
# Local development:
# redirect_uri = "http://localhost:8501/oauth2callback"
# Public deployed app:
# redirect_uri = "https://appendicitis-complicated-risk-calculator.streamlit.app/oauth2callback"

[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
client_id = "YOUR_OIDC_CLIENT_ID"
client_secret = "YOUR_OIDC_CLIENT_SECRET"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

# -------------------------
# 2) OPTIONAL MEMBER WHITELIST
# -------------------------
# Nếu để trống, mọi người dùng đã đăng nhập đều có thể lưu.
# Nếu khai báo, chỉ những email trong danh sách mới lưu được.

[members]
allowed_emails = [
  "Longlk@pnt.edu.vn"
]

# -------------------------
# 3A) LOCAL SAVE DEMO ONLY (SQLite)
# -------------------------
# Dùng tốt cho localhost / test nhanh.
# KHÔNG nên dùng cho bản public nếu cần lưu lâu dài.
# Community Cloud không đảm bảo local file storage tồn tại bền vững.

# [connections.app_db]
# url = "sqlite:///appendicitis_app_local.db"

# -------------------------
# 3B) PRODUCTION / PUBLIC SAVE (Recommended)
# -------------------------
# Ví dụ PostgreSQL / Supabase / Neon / Render Postgres / Azure Postgres...
# Chỉ bật khối này khi đã có remote database thật.

# [connections.app_db]
# dialect = "postgresql"
# host = "YOUR_REMOTE_HOST"
# port = "5432"
# database = "YOUR_DATABASE_NAME"
# username = "YOUR_DATABASE_USER"
# password = "YOUR_DATABASE_PASSWORD"
